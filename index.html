<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>넥슨 Valuation & Peer Benchmarking 터미널</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0f;--bg2:#14141a;--bg3:#1c1c24;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --tx:#f0f0f4;--tx2:#a0a0b0;--tx3:#606070;
  --red:#e05252;--green:#18a974;--amber:#f59e0b;--blue:#3b82f6;
  --accent:#6366f1;--accent2:#818cf8;
  --r:6px;--rl:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5;}
.wrap{max-width:1160px;margin:0 auto;padding:0 20px 48px;}
.hd{padding:16px 0 0;margin-bottom:20px;}
.hd-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  padding:14px 20px;background:linear-gradient(135deg,#1e1b4b,#312e81,#1e1b4b);
  border:1px solid rgba(99,102,241,.3);border-radius:var(--rl);}
.hd-left{display:flex;align-items:center;gap:14px;}
.hd-logo{width:38px;height:38px;border-radius:10px;background:rgba(99,102,241,.3);
  border:1px solid rgba(99,102,241,.5);display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:800;color:#818cf8;}
.hd-title{font-size:15px;font-weight:700;color:#e0e0f0;}
.hd-sub{font-size:10px;color:rgba(160,160,200,.7);margin-top:2px;}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.tab-row{display:flex;flex-wrap:wrap;gap:2px;background:var(--bg2);border:1px solid var(--bd);
  border-radius:var(--rl);padding:4px;margin-bottom:20px;}
.tab{background:transparent;border:none;border-radius:8px;padding:7px 14px;
  font-size:11.5px;font-weight:500;color:var(--tx3);cursor:pointer;white-space:nowrap;}
.tab:hover{color:var(--tx2);background:var(--bg3);}
.tab.on{background:var(--bg3);color:var(--accent2);font-weight:700;border:1px solid rgba(99,102,241,.3);}
.sec{display:none;}.sec.on{display:block;}
.ctrl{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:12px;
  padding:10px 14px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--bd);}
.lbl{font-size:10.5px;font-weight:600;color:var(--tx3);}
select{font-size:11px;padding:4px 8px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);}
.pill{background:var(--bg3);border:1px solid var(--bd2);border-radius:5px;padding:3px 9px;
  font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;}
.card-title{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:10px;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:700px){.g4{grid-template-columns:repeat(2,1fr);}.g2{grid-template-columns:1fr;}}
.mc{background:var(--bg3);border-radius:var(--rl);padding:12px 14px;border:1px solid var(--bd);}
.mc-l{font-size:9.5px;font-weight:600;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;}
.mc-v{font-size:20px;font-weight:700;color:var(--tx);line-height:1.2;}
.mc-s{font-size:10px;color:var(--tx3);margin-top:3px;}
.tw{overflow-x:auto;}
.t{width:100%;border-collapse:collapse;font-size:11.5px;}
.t th{background:var(--bg3);padding:8px 10px;text-align:center;font-size:10px;font-weight:600;color:var(--tx3);border-bottom:1px solid var(--bd2);white-space:nowrap;}
.t td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--bd);color:var(--tx);}
.t tr:last-child td{border-bottom:none;}
.t tr.nx{background:rgba(99,102,241,.06);}
.t tr:hover td{background:var(--bg3);}
.bdg{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;display:inline-block;}
.bu{background:rgba(24,169,116,.15);color:#34d399;}
.bk{background:rgba(59,130,246,.15);color:#60a5fa;}
.bh{background:rgba(245,158,11,.15);color:#fbbf24;}
.bj{background:rgba(224,82,82,.15);color:#f87171;}
.rn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;background:var(--bg3);}
.r1{background:linear-gradient(135deg,#ffd700,#ffb800);color:#4a3800;}
.r2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#333;}
.r3{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff;}
.up{color:var(--red);font-weight:600;}
.dn{color:#3b82f6;font-weight:600;}
.nx-n{color:var(--accent2);font-weight:700;}
.note{font-size:10px;color:var(--tx3);margin-top:8px;padding:6px 10px;background:var(--bg3);border-radius:var(--r);}
.sec-lbl{font-size:10.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;margin:16px 0 10px;display:flex;align-items:center;gap:6px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bd);}
.pgb{display:inline-flex;align-items:center;font-size:10px;font-weight:700;color:var(--tx3);background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;margin-bottom:12px;}
.rk-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;background:transparent;border:1px solid transparent;transition:transform .18s ease;}
.rk-row:hover{transform:translateX(4px);background:rgba(255,255,255,.03);}
.rk-row.nx{background:linear-gradient(90deg,rgba(99,102,241,.18),rgba(99,102,241,.05));border:1px solid rgba(129,140,248,.45);}
.rk-row.na{opacity:.4;}
.rk-badge{width:20px;height:20px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;}
.rk-badge.g1{background:linear-gradient(135deg,#fde68a,#f59e0b);color:#3a2600;}
.rk-badge.g2{background:linear-gradient(135deg,#eef2f6,#94a3b8);color:#1f2937;}
