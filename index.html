<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXON IR Dashboard - Valuation</title>
    <!-- Chart.js 및 날짜 처리 어댑터 필수 포함 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root {
            --bg: #0a0e16; --surface: #141b28; --surface2: #1a2436; --line: #1e2836;
            --txt: #e8edf5; --txt2: #a9b8cd; --txt3: #7f92ad;
            --mint: #4dd6c1; --blue: #5b9dff; --gold: #ffc107; --red: #f06a6a; --green: #3fcf8e;
        }
        body { background-color: var(--bg); color: var(--txt); font-family: sans-serif; padding: 10px; margin: 0; }
        .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 14px; margin-bottom: 14px; }
        .col { display: flex; flex-direction: column; }
        .card { background-color: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 16px; flex-grow: 1; }
        .ct { font-size: 18px; font-weight: 900; color: var(--txt); border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 15px; }
        .ct .bar { display: inline-block; width: 4px; height: 18px; background-color: var(--mint); margin-right: 8px; vertical-align: -3px; border-radius: 2px; }
        .ct .r { float: right; font-size: 12px; font-weight: 600; color: var(--txt3); }
        .note { font-size: 11.5px; color: var(--txt3); line-height: 1.6; margin-top: 15px; }
        .statgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(158px, 1fr)); gap: 10px; margin-top: 4px; }
        .statcard { background: rgba(255,255,255,.03); border: 1px solid var(--line); border-radius: 10px; padding: 12px 13px; }
        .statcard .sm { font-size: 12.5px; color: #9fb0c8; font-weight: 700; margin-bottom: 5px; }
        .statcard .sv { font-size: 20px; font-weight: 900; color: #e8edf5; margin-bottom: 7px; }
        .statcard .sc { display: flex; gap: 5px; flex-wrap: wrap; }
        .schip { font-size: 10.5px; font-weight: 900; padding: 2.5px 7px; border-radius: 20px; white-space: nowrap; }
        .schip.good { background: rgba(63,207,142,.16); color: #3fcf8e; }
        .schip.bad { background: rgba(240,106,106,.16); color: #f06a6a; }
        .schip.mid { background: rgba(127,146,173,.14); color: #9fb0c8; }
        .anSec { margin-bottom: 16px; padding: 13px 15px; border-radius: 10px; background: rgba(255,255,255,.03); border-left: 3px solid var(--line); }
        .anSec.kr { border-left-color: #f4c151; }
        .anSec.ov { border-left-color: #5b9dff; }
        .anSec.sum { border-left-color: #4dd6c1; background: rgba(77,214,193,.06); }
        .anH { font-size: 14px; font-weight: 900; color: #e8edf5; margin-bottom: 8px; }
        .anL { font-size: 13px; color: #c8d3e0; line-height: 1.7; margin-bottom: 4px; }
        .anL b { color: #fff; font-weight: 800; }
        .anL .up { color: #3fcf8e; font-weight: 800; }
        .anL .dn { color: #f06a6a; font-weight: 800; }
    </style>
</head>
<body>

    <div class="row">
        <div class="col">
            <div class="card">
                <div class="ct"><span class="bar"></span>P/E 밴드 차트
                    <span class="r">과거 5년 기준</span>
                </div>
                <div style="height: 250px;"><canvas id="peBandChart"></canvas></div>
            </div>
        </div>
        <div class="col">
            <div class="card">
                <div class="ct"><span class="bar"></span>피어 그룹 멀티플 비교
                    <span class="r" id="vsMeta">Yahoo/DART 실측 중앙값</span>
                </div>
                <div style="height: 250px;"><canvas id="peerMultiplesChart"></canvas></div>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col">
            <div class="card">
                <div class="ct"><span class="bar"></span>각 지표 현재 상태 진단</div>
                <div class="statgrid" id="diagGrid"></div>
            </div>
        </div>
        <div class="col">
            <div class="card">
                <div class="ct"><span class="bar"></span>넥슨 주가 종합 평가</div>
                <div id="anBody"></div>
            </div>
        </div>
    </div>

    <!-- 💡 하단 안내 및 실시간 업데이트 뱃지 -->
    <div class="note" style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
        <span id="footNote">※ 실시간 데이터 연결 중…</span>
        <span id="updateTimeBadge" style="background: rgba(77,214,193,0.1); color: var(--mint); padding: 5px 10px; border-radius: 15px; font-weight: 700; display: none;">
            업데이트 기준: 로딩 중...
        </span>
    </div>

<script>
// 🚨 필수 수정: 아래 URL을 방금 만드신 Cloudflare Worker 주소로 변경하세요!
const API_ENDPOINT = 'https://nexon-valuation-api.YOUR-ACCOUNT.workers.dev'; 

const CHART_DEFAULTS = { fontColor: '#e8edf5', gridColor: 'rgba(255, 255, 255, 0.1)', nexon: '#4dd6c1', kr: '#f4c151', ov: '#5b9dff' };

// 1. API 데이터 호출 (프라미스 할당)
window.__ready = fetch(API_ENDPOINT)
    .then(res => {
        if (!res.ok) throw new Error('서버 응답 오류');
        return res.json();
    })
    .then(data => {
        // 업데이트 타임스탬프 뱃지 렌더링
        if (data.meta && data.meta.updatedAt) {
            const ut = new Date(data.meta.updatedAt);
            const formatted = ut.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            const badge = document.getElementById('updateTimeBadge');
            badge.style.display = 'inline-block';
            badge.textContent = `기준 시점: ${formatted}`;
        }
        document.getElementById('footNote').innerHTML = "※ 본 자료는 참고용이며, 출처는 Yahoo Finance 및 DART입니다.";
        return data;
    })
    .catch(err => {
        console.error(err);
        document.getElementById('footNote').innerHTML = "<span style='color:#f06a6a'>※ 데이터 연동 실패. 주소(URL)를 확인하거나 F12 개발자 도구를 확인하세요.</span>";
        throw err;
    });

// 2. 차트 렌더링 함수
function drawPeBandChart(data) {
    const ctx = document.getElementById('peBandChart');
    if (!ctx || !data || data.length === 0) return;
    new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [
                { label: '현재 주가', data: data.map(d => ({ x: d.date, y: d.price })), borderColor: CHART_DEFAULTS.nexon, borderWidth: 2, tension: 0.1, pointRadius: 0 },
                { label: 'PER High (30x)', data: data.map(d => ({ x: d.date, y: d.eps * 30 })), borderColor: 'rgba(240, 106, 106, 0.5)', borderWidth: 1, borderDash: [5, 5], pointRadius: 0 },
                { label: 'PER Avg (20x)', data: data.map(d => ({ x: d.date, y: d.eps * 20 })), borderColor: 'rgba(255, 255, 255, 0.4)', borderWidth: 1, pointRadius: 0 },
                { label: 'PER Low (10x)', data: data.map(d => ({ x: d.date, y: d.eps * 10 })), borderColor: 'rgba(91, 157, 255, 0.5)', borderWidth: 1, borderDash: [5, 5], pointRadius: 0, fill: { target: 'end', above: 'rgba(91, 157, 255, 0.05)' } }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: CHART_DEFAULTS.fontColor, boxWidth: 12 } } }, scales: { x: { type: 'time', time: { unit: 'year' }, grid: { color: CHART_DEFAULTS.gridColor }, ticks: { color: CHART_DEFAULTS.fontColor } }, y: { grid: { color: CHART_DEFAULTS.gridColor }, ticks: { color: CHART_DEFAULTS.fontColor } } } }
    });
}

function drawPeerChart(me, kr, ov) {
    const ctx = document.getElementById('peerMultiplesChart');
    if (!ctx || !me) return;
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['PER (x)', 'PBR (x)', '영업이익률 (%)'],
            datasets: [
                { label: '넥슨', data: [me.per, me.pbr, me.opm], backgroundColor: CHART_DEFAULTS.nexon },
                { label: '국내 피어', data: [kr.per, kr.pbr, kr.opm], backgroundColor: CHART_DEFAULTS.kr },
                { label: '해외 피어', data: [ov.per, ov.pbr, ov.opm], backgroundColor: CHART_DEFAULTS.ov }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: CHART_DEFAULTS.fontColor } } }, scales: { y: { grid: { color: CHART_DEFAULTS.gridColor }, ticks: { color: CHART_DEFAULTS.fontColor } }, x: { grid: { display: false }, ticks: { color: CHART_DEFAULTS.fontColor } } } }
    });
}

// 3. 메인 로직 실행
window.__ready.then(j => {
    const me = (j.peers || []).find(x => x.sym === '3659.T') || {};
    const kr = j.peerStats?.kr || {};
    const ov = j.peerStats?.ov || {};

    // 차트 그리기
    drawPeBandChart(j.historicalData);
    drawPeerChart(me, kr, ov);

    // 진단 그리드 그리기
    const M = [
      { k:'per', n:'PER', u:'x', lo:true }, { k:'pbr', n:'PBR', u:'x', lo:true },
      { k:'opm', n:'영업이익률', u:'%', lo:false }, { k:'roe', n:'ROE', u:'%', lo:false }
    ];
    let g = '';
    M.forEach(m => {
        let v = me[m.k]; if(v==null) return;
        let gk = kr[m.k] ? (v/kr[m.k]-1)*100 : null, go = ov[m.k] ? (v/ov[m.k]-1)*100 : null;
        const chip = (gap, lo) => {
            if(gap==null) return '<span class="schip mid"> — </span>';
            let good = lo ? gap < -5 : gap > 5, bad = lo ? gap > 5 : gap < -5;
            return `<span class="schip ${good?'good':bad?'bad':'mid'}">${good?'우위':bad?'열위':'유사'}</span>`;
        };
        g += `<div class="statcard"><div class="sm">${m.n}</div><div class="sv">${v}${m.u}</div><div class="sc">국내 ${chip(gk, m.lo)} 해외 ${chip(go, m.lo)}</div></div>`;
    });
    document.getElementById('diagGrid').innerHTML = g;

    // 종합 평가 텍스트
    document.getElementById('anBody').innerHTML = `<div class="anSec sum"><div class="anH">종합 요약</div><div class="anL">현재 넥슨의 실시간 주가는 <b>${j.price.current.toLocaleString()}엔</b> 입니다. 차트에서 보듯 밸류에이션 및 피어 그룹 대비 수익성을 모니터링 중입니다.</div></div>`;
}).catch(e => console.log('렌더링 에러:', e));
</script>
</body>
</html>
